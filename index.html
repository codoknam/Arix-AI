<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arix! v1.0</title>
<meta name="theme-color" content="#000080">
<link rel="manifest" href="manifest.json">
<style>
:root{
--navy:#000080;
--bg:#f5f5f5;
--button-text:#fff;
}
body{margin:0;font-family:sans-serif;background:var(--bg);display:flex;height:100vh}
.sidebar{width:260px;background:var(--navy);color:white;padding:15px;display:flex;flex-direction:column}
.chat-area{flex:1;display:flex;flex-direction:column}
.header{padding:15px;background:white;border-bottom:1px solid #ddd}
.messages{flex:1;overflow:auto;padding:20px}
.message{padding:12px;border-radius:12px;margin:8px 0;max-width:75%}
.user{background:#dff3ff;margin-left:auto}
.ai{background:white}
.input-area{display:flex;padding:10px;background:white;border-top:1px solid #ddd}
textarea{flex:1;resize:none;padding:10px}
button{cursor:pointer}
#send{margin-left:8px}
.version{margin-top:auto;opacity:.7;font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="sidebar">
<h2>Arix!</h2>
<button onclick="newChat()">새 채팅</button>
<div class="version">Arix v1.0</div>
</div>

<div class="chat-area">
<div class="header">Arix AI</div>
<div class="messages" id="messages"></div>

<div class="input-area">
<textarea id="input" placeholder="메시지 입력"></textarea>
<button id="send" onclick="sendMessage()">전송</button>
</div>
</div>

<script>
const messages=document.getElementById("messages");

function saveMessages(){
 localStorage.setItem("arix_messages",messages.innerHTML);
}

function loadMessages(){
 const d=localStorage.getItem("arix_messages");
 if(d) messages.innerHTML=d;
}

function addMessage(text,type){
 const div=document.createElement("div");
 div.className="message "+type;
 div.textContent=text;
 messages.appendChild(div);
 messages.scrollTop=messages.scrollHeight;
 saveMessages();
}

function newChat(){
 if(confirm("새 채팅을 시작할까요?")){
   messages.innerHTML="";
   saveMessages();
 }
}

async function askArix(message){
 const res=await fetch("https://YOUR-RENDER-URL/chat",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({message})
 });
 const data=await res.json();
 return data.reply || data.response || "응답 없음";
}

async function sendMessage(){
 const input=document.getElementById("input");
 const text=input.value.trim();
 if(!text) return;

 addMessage(text,"user");
 input.value="";

 const loading=document.createElement("div");
 loading.className="message ai";
 loading.id="loading";
 loading.textContent="Arix 생각중...";
 messages.appendChild(loading);

 try{
   const reply=await askArix(text);
   document.getElementById("loading")?.remove();
   addMessage(reply,"ai");
 }catch(e){
   document.getElementById("loading")?.remove();
   addMessage("서버 오류 😥","ai");
 }
}

loadMessages();
</script>
</body>
</html>
